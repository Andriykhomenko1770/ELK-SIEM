services:
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    user: "0"
    command: >
      bash -c '
        mkdir -p /usr/share/elasticsearch/config/certs &&
        chown -R root:root /usr/share/elasticsearch/config/certs &&
        chmod -R 750 /usr/share/elasticsearch/config/certs &&

        if [ ! -f /usr/share/elasticsearch/config/certs/ca/ca.crt ]; then
          echo "Generating new CA and certificates..." &&
          elasticsearch-certutil ca --silent --pem --out /usr/share/elasticsearch/config/certs/ca.zip &&
          unzip /usr/share/elasticsearch/config/certs/ca.zip -d /usr/share/elasticsearch/config/certs &&
          elasticsearch-certutil cert --silent --pem \
            --in /usr/share/elasticsearch/config/certs/instances.yml \
            --out /usr/share/elasticsearch/config/certs/certs.zip \
            --ca-cert /usr/share/elasticsearch/config/certs/ca/ca.crt \
            --ca-key /usr/share/elasticsearch/config/certs/ca/ca.key &&
          unzip /usr/share/elasticsearch/config/certs/certs.zip -d /usr/share/elasticsearch/config/certs &&
          echo "Certificates generated successfully"
        else
          echo "Certificates already exist, skipping generation"
        fi &&

        chown -R 1000:0 /usr/share/elasticsearch/config/certs &&
        chmod -R 750 /usr/share/elasticsearch/config/certs
      '
    healthcheck:
      test: ["CMD-SHELL", "[ -f /usr/share/elasticsearch/config/certs/ca/ca.crt ]"]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 10s
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - ./instances.yml:/usr/share/elasticsearch/config/certs/instances.yml

  es01:
    depends_on:
      setup:
        condition: service_completed_successfully   # найважливіша зміна!
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: es01
    restart: unless-stopped
    environment:
      - node.name=es01
      - cluster.name=docker-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=true
      - KIBANA_SYSTEM_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/es01/es01.key
      - xpack.security.http.ssl.certificate=certs/es01/es01.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/es01/es01.key
      - xpack.security.transport.ssl.certificate=certs/es01/es01.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=basic
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - certs:/usr/share/elasticsearch/config/certs:ro
      - esdata01:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s --cacert /usr/share/elasticsearch/config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication'"]
      interval: 10s
      timeout: 30s
      retries: 5

  kibana:
    depends_on:
      es01:
        condition: service_healthy
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTIC_KIBANA_USERNAME=${ELASTIC_KIBANA_USERNAME}
      - ELASTIC_KIBANA_PASSWORD=${ELASTIC_KIBANA_PASSWORD}
      - XPACK_SECURITY_ENCRYPTION_KEY=${XPACK_SECURITY_ENCRYPTION_KEY}
      - XPACK_ENCRYPTED_SAVED_OBJECTS_KEY=${XPACK_ENCRYPTED_SAVED_OBJECTS_KEY}
      - XPACK_REPORTING_ENCRYPTION_KEY=${XPACK_REPORTING_ENCRYPTION_KEY}
      - SERVERNAME=kibana
    volumes:
      - certs:/usr/share/kibana/config/certs:ro
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml

  filebeat:
    depends_on:
      es01:
        condition: service_healthy
    image: docker.elastic.co/beats/filebeat:${STACK_VERSION}
    container_name: filebeat
    restart: unless-stopped
    user: root
    command: filebeat -e -strict.perms=false
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - certs:/usr/share/filebeat/config/certs:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - -strict.perms=false

volumes:
  certs:
  esdata01:
